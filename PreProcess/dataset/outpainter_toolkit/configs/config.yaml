# ======================================================================
#    数据 & 模型
# ======================================================================
input_root:  /absolute/path/to/input_images        # 原始图片根目录
output_root: /absolute/path/to/output              # 所有输出（会自动创建）

model_path:  stabilityai/stable-diffusion-2-inpainting   # 可以填本地绝对路径
blip_path:   Salesforce/blip-image-captioning-base       # 也可填本地绝对路径

# ======================================================================
#    扩图版本控制 —— *二选一*
# ----------------------------------------------------------------------
# 方案 A：固定版本，列表长度 = 每张原图要生成的张数
version_params:
  - [4.0, 50]    # guidance_scale, num_inference_steps
  - [6.0, 60]
  - [8.0, 40]

# 方案 B：从版本池随机抽 random_pick 张   (把上面 version_params 整段注释掉)
#version_pool:
#  - [4.0, 50]
#  - [6.0, 60]
#  - [8.0, 40]
#random_pick: 1                   # 随机抽几张

# ======================================================================
#    生成细节
# ======================================================================
negative_prompt: frame, border, text, watermark, logo, UI, unnatural patterns, lowres
min_ratio: 0.10            # 左右上下随机白边比例下限
max_ratio: 0.475           # 左右上下随机白边比例上限
max_side: 600              # 原图缩放到最长边不超过该值
border_check: false        # true → 对生成图做 Canny 边框检测并丢弃
grid_margin: 20            # 网格图块之间的空隙像素
